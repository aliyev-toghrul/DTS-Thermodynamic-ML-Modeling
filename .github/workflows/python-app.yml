name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch pandas matplotlib scikit-learn numpy
        
    - name: Check code syntax
      run: |
        # Since the Stage2_data.zip isn't uploaded to github, running main.py would fail!
        # Therefore, this simply checks that the script is written correctly in Python.
        python -m py_compile main.py
